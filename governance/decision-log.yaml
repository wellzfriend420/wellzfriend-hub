schema_version: 1
decisions:
  - decision_id: DEC-0002
    title: "WFS Ver.0.1の正式採用"
    status: accepted
    decision_date: "2026-07-04"
    owner_role: 開発標準管理責任者
    approver_role: アプリ事業責任者
    context: "全システムの開発・保守・AI引継ぎ・テンプレート運用を、最小限の共通ルールから統一する。"
    decision: "WFS-001からWFS-007をWellzFriend Standard Ver.0.1として正式採用する。"
    consequences: "新規システムはWFS Ver.0.1を基準とし、実運用で効果確認済みの改善だけを次Versionへ反映する。"
    canonical_reference: ../standards/wfs/README.md

  - decision_id: DEC-0001
    title: "データ保存場所の役割分担"
    status: accepted
    decision_date: "2026-07-04"
    owner_role: 情報管理責任者
    approver_role: アプリ事業責任者
    context: "設計情報、利用成果物、業務データ、開発途中の情報の正本重複を防止する。"
    decision: "GitHubを設計図書館、Google Driveを業務書庫、各会社統合DBをデータ保管庫、ローカルWellzFriend_OSを開発工房とする。"
    consequences: "テンプレート設計情報はGitHub、親テンプレート実体はGoogle Drive、業務データは各会社統合DBへ保存する。"
    canonical_reference: ../standards/data-storage-principles.md
