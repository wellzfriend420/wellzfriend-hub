schema_version: 1
decisions:
  - decision_id: DEC-0001
    title: "データ保存場所の役割分担"
    status: accepted
    decision_date: "2026-07-04"
    owner_role: 情報管理責任者
    approver_role: アプリ事業責任者
    context: "設計情報、利用成果物、業務データ、開発途中の情報の正本重複を防止する。"
    decision: "GitHubを設計図書館、Google Driveを業務書庫、各会社統合DBをデータ保管庫、ローカルWellzFriend_OSを開発工房とする。"
    consequences: "テンプレート設計情報はGitHub、親テンプレート実体はGoogle Drive、業務データは各会社統合DBへ保存する。"
    canonical_reference: ../standards/data-storage-principles.md
